services:
  db:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - wordpress_db:/var/lib/mysql
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M

  wordpress:
    depends_on:
      - db
    image: wordpress:6.8.1
    restart: always
    ports:
      - "8080:80"
    volumes:
      - wordpress_files:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
    networks:
      - backend
      - frontend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M

  phpmyadmin:
    image: phpmyadmin:5.2.2
    restart: always
    ports:
      - "8081:80" # Accessible uniquement en local
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER} # Utilisateur limité, pas root
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - backend
      - frontend
    security_opt:
      - no-new-privileges:true

volumes:
  wordpress_db:
  wordpress_files:


networks:
  backend:
    internal: true # Pas d'accès internet direct pour db et phpmyadmin
  frontend:
